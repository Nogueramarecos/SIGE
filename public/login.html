<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGE - Login</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-body">

  <div class="login-container">

    <div class="login-icon">🚨</div>

    <h2>SIGE</h2>

    <p class="login-subtitle">
      Sistema Inteligente de Gestión de Emergencias
    </p>

    <div class="login-form">

      <input
        type="text"
        id="username"
        placeholder="Usuario"
        required>

      <input
        type="password"
        id="password"
        placeholder="Contraseña"
        required>

      <button onclick="login()" class="login-btn">
        Ingresar
      </button>

      <div id="mensaje"></div>

    </div>

  </div>

  <script>
    async function login() {

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      const mensaje = document.getElementById('mensaje');

      if (!username || !password) {
        mensaje.className = 'login-error';
        mensaje.innerText = 'Ingrese usuario y contraseña';
        return;
      }

      try {

        const response = await fetch('/api/login', {
          method: 'POST',

          headers: {
            'Content-Type': 'application/json'
          },

          body: JSON.stringify({
            usuario: username,
            clave: password
          })
        });

        const data = await response.json();

        if (data.success) {

          localStorage.setItem('usuario', data.usuario);
          localStorage.setItem('username', data.username);
          localStorage.setItem('rol', data.rol);

          mensaje.className = 'login-success';
          mensaje.innerText = 'Bienvenido ' + data.usuario;

          setTimeout(() => {
            window.location.href = 'menu.html';
          }, 1000);

        } else {

          mensaje.className = 'login-error';
          mensaje.innerText = data.message;

        }

      } catch (error) {

        console.error(error);

        mensaje.className = 'login-error';
        mensaje.innerText = 'No se pudo conectar con el servidor';

      }
    }
  </script>

</body>
</html>
