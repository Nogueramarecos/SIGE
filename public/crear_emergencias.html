<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SIGE - Crear Emergencia</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <aside class="sidebar">
    <h2>SIGE</h2>

    <a href="menu.html">🏠 Inicio</a>
    <a href="dashboard_emergencias.html">📊 Dashboard</a>
    <a href="listar_emergencias.html">🚨 Listar Emergencias</a>
    <a href="crear_emergencias.html">➕ Crear Emergencia</a>
    <a href="reportes_emergencias.html">📄 Reportes</a>
    <a href="login.html">🚪 Cerrar sesión</a>
  </aside>

  <main class="main">

    <section class="header">
      <h1>Registrar Emergencia</h1>
      <p>Complete el formulario para registrar una nueva emergencia.</p>
    </section>

    <section class="form-card">

      <div class="form-grid">

        <div>
          <label>Tipo de Emergencia</label>
          <select id="tipo">
            <option value="">Seleccione</option>
            <option value="MEDICA">Médica</option>
            <option value="INCENDIO">Incendio</option>
            <option value="ACCIDENTE">Accidente</option>
            <option value="SEGURIDAD">Seguridad</option>
            <option value="RESCATE">Rescate</option>
            <option value="OTRO">Otro</option>
          </select>
        </div>

        <div>
          <label>Prioridad</label>
          <select id="prioridad">
            <option value="">Seleccione</option>
            <option value="BAJA">Baja</option>
            <option value="MEDIA">Media</option>
            <option value="ALTA">Alta</option>
            <option value="CRITICA">Crítica</option>
          </select>
        </div>

        <div>
          <label>Ciudad</label>
          <input type="text" id="ciudad" placeholder="Ingrese ciudad">
        </div>

        <div>
          <label>Dirección</label>
          <input type="text" id="direccion" placeholder="Ingrese dirección">
        </div>

      </div>

      <br>

      <div>
        <label>Descripción</label>
        <textarea id="descripcion" rows="5" placeholder="Describa la emergencia"></textarea>
      </div>

      <div class="acciones">
        <button class="btn btn-guardar" onclick="guardarEmergencia()">
          💾 Guardar Emergencia
        </button>

        <a href="listar_emergencias.html" class="btn btn-volver">
          ⬅ Volver
        </a>
      </div>

      <div id="mensaje" class="mensaje"></div>

    </section>

  </main>

  <script src="js/crear_emergencias.js"></script>

</body>
</html>
