<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SIGE - Actualizar Emergencia</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <aside class="sidebar">
    <h2>SIGE</h2>

    <a href="menu.html">🏠 Inicio</a>
    <a href="dashboard_emergencias.html">📊 Dashboard</a>
    <a href="listar_emergencias.html">🚨 Listar Emergencias</a>
    <a href="crear_emergencias.html">➕ Crear Emergencia</a>
    <a href="reportes_emergencias.html">📄 Reportes</a>
    <a href="login.html">🚪 Cerrar sesión</a>
  </aside>

  <main class="main">

    <section class="header">
      <h1>Actualizar Emergencia</h1>
      <p>Modifique los datos de una emergencia registrada.</p>
    </section>

    <section class="form-card">

      <input type="hidden" id="emergencia_id">

      <div class="form-grid">

        <div>
          <label>Tipo de Emergencia</label>
          <select id="tipo">
            <option value="">Seleccione</option>
            <option value="INCENDIO">Incendio</option>
            <option value="ACCIDENTE">Accidente</option>
            <option value="ROBO">Robo</option>
            <option value="SALUD">Salud</option>
            <option value="MEDICA">Médica</option>
            <option value="OTRO">Otro</option>
          </select>
        </div>

        <div>
          <label>Prioridad</label>
          <select id="prioridad">
            <option value="">Seleccione</option>
            <option value="BAJA">Baja</option>
            <option value="MEDIA">Media</option>
            <option value="ALTA">Alta</option>
            <option value="CRITICA">Crítica</option>
          </select>
        </div>

        <div>
          <label>Estado</label>
          <select id="estado">
            <option value="PENDIENTE">Pendiente</option>
            <option value="ASIGNADA">Asignada</option>
            <option value="EN_PROCESO">En proceso</option>
            <option value="ATENDIDA">Atendida</option>
            <option value="CANCELADA">Cancelada</option>
          </select>
        </div>

        <div>
          <label>Ciudad</label>
          <input type="text" id="ciudad" placeholder="Ingrese ciudad">
        </div>

        <div>
          <label>Dirección</label>
          <input type="text" id="direccion" placeholder="Ingrese dirección">
        </div>

        <div>
          <label>Institución asignada</label>
          <select id="institucion_id">
            <option value="">Seleccione institución</option>
          </select>
        </div>

        <div>
          <label>Unidad asignada</label>
          <select id="unidad_id">
            <option value="">Seleccione unidad</option>
          </select>
        </div>

      </div>

      <br>

      <div>
        <label>Descripción</label>
        <textarea
          id="descripcion"
          rows="5"
          placeholder="Describa la emergencia"></textarea>
      </div>

      <div class="acciones">
        <button
          class="btn btn-guardar"
          onclick="actualizarEmergencia()">
          💾 Actualizar Emergencia
        </button>

        <a href="listar_emergencias.html" class="btn btn-volver">
          ⬅ Volver
        </a>
      </div>

      <div id="mensaje" class="mensaje"></div>

    </section>

  </main>

  <script src="Frontend-Routes/auth.js"></script>

  <script>
    verificarSesion();

    permitirRoles([
      'Administrador',
      'Supervisor',
      'Operador'
    ]);
  </script>

  <script src="Frontend-Routes/actualizar_emergencias.js"></script>

</body>
</html>
